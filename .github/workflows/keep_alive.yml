name: Keep Alive

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Re-enable scheduled workflows
        run: |
          gh workflow enable update_scores.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
